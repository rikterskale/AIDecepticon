name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (Ubuntu)
        if: runner.os == 'Linux'
        run: pip install -e ".[dev]"
      - name: Bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 bootstrap
      - name: Lint (Ubuntu)
        if: runner.os == 'Linux'
        run: ruff check .
      - name: Test (Ubuntu)
        if: runner.os == 'Linux'
        run: pytest --cov=deceptionflow --cov-report=term-missing --cov-fail-under=85
      - name: Lint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 lint
      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 test
      - name: Validate Docker Compose (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: docker compose config --quiet

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start Docker Compose
        run: docker compose up --build --detach
      - name: Wait for collector health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs
          exit 1
      - name: Stop Docker Compose
        if: always()
        run: docker compose down --volumes
