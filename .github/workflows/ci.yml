name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (Ubuntu)
        if: runner.os == 'Linux'
        run: pip install -e ".[dev]"
      - name: Bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 bootstrap
      - name: Lint (Ubuntu)
        if: runner.os == 'Linux'
        run: ruff check .
      - name: Test (Ubuntu)
        if: runner.os == 'Linux'
        run: pytest --cov=deceptionflow --cov-report=term-missing
      - name: Lint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 lint
      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\dev.ps1 test
